<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#0d1127"/>
      <stop offset="100%" style="stop-color:#060612"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#7b61ff"/>
      <stop offset="100%" style="stop-color:#ff3cac"/>
    </linearGradient>
    <linearGradient id="waveV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#7b61ff"/>
    </linearGradient>
    <linearGradient id="brace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="50%" style="stop-color:#ffaa00"/>
      <stop offset="100%" style="stop-color:#ffd700"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00f0ff;stop-opacity:0.06"/>
      <stop offset="100%" style="stop-color:#00f0ff;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="heavyglow">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <clipPath id="roundRect">
      <rect width="256" height="256" rx="48"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Clip everything inside rounded rect -->
  <g clip-path="url(#roundRect)">

    <!-- Circuit trace lines -->
    <g opacity="0.07" stroke="#00f0ff" stroke-width="0.75" fill="none">
      <!-- Horizontal traces -->
      <line x1="0" y1="42" x2="40" y2="42"/>
      <line x1="40" y1="42" x2="48" y2="50"/>
      <line x1="48" y1="50" x2="80" y2="50"/>
      <circle cx="80" cy="50" r="2"/>

      <line x1="256" y1="42" x2="216" y2="42"/>
      <line x1="216" y1="42" x2="208" y2="50"/>
      <line x1="208" y1="50" x2="176" y2="50"/>
      <circle cx="176" cy="50" r="2"/>

      <line x1="0" y1="206" x2="35" y2="206"/>
      <line x1="35" y1="206" x2="43" y2="214"/>
      <line x1="43" y1="214" x2="75" y2="214"/>
      <circle cx="75" cy="214" r="2"/>

      <line x1="256" y1="206" x2="221" y2="206"/>
      <line x1="221" y1="206" x2="213" y2="214"/>
      <line x1="213" y1="214" x2="181" y2="214"/>
      <circle cx="181" cy="214" r="2"/>

      <!-- Vertical traces -->
      <line x1="30" y1="0" x2="30" y2="28"/>
      <line x1="30" y1="28" x2="38" y2="36"/>
      <line x1="226" y1="0" x2="226" y2="28"/>
      <line x1="226" y1="28" x2="218" y2="36"/>
      <line x1="30" y1="256" x2="30" y2="228"/>
      <line x1="30" y1="228" x2="38" y2="220"/>
      <line x1="226" y1="256" x2="226" y2="228"/>
      <line x1="226" y1="228" x2="218" y2="220"/>
    </g>

    <!-- Fine grid overlay -->
    <g opacity="0.025" stroke="#00f0ff" stroke-width="0.5">
      <line x1="0" y1="64" x2="256" y2="64"/>
      <line x1="0" y1="96" x2="256" y2="96"/>
      <line x1="0" y1="128" x2="256" y2="128"/>
      <line x1="0" y1="160" x2="256" y2="160"/>
      <line x1="0" y1="192" x2="256" y2="192"/>
      <line x1="64" y1="0" x2="64" y2="256"/>
      <line x1="96" y1="0" x2="96" y2="256"/>
      <line x1="128" y1="0" x2="128" y2="256"/>
      <line x1="160" y1="0" x2="160" y2="256"/>
      <line x1="192" y1="0" x2="192" y2="256"/>
    </g>

    <!-- Scanline sweep effect -->
    <rect x="0" y="80" width="256" height="60" fill="url(#scanline)"/>

    <!-- Hex data decoration top-left -->
    <text x="14" y="24" font-family="monospace" font-size="7" fill="#00f0ff" opacity="0.12">0x4F 56 52</text>

    <!-- Hex data decoration bottom-right -->
    <text x="158" y="246" font-family="monospace" font-size="7" fill="#7b61ff" opacity="0.12">SSML::NEURAL</text>

    <!-- Heavy background glow behind waveform -->
    <ellipse cx="128" cy="128" rx="70" ry="55" fill="#7b61ff" opacity="0.08" filter="url(#heavyglow)"/>

    <!-- Waveform reflection (subtle, below) -->
    <g transform="translate(128, 150) scale(1, -0.15)" opacity="0.06">
      <path d="M-100,0 C-95,-4 -92,6 -88,-8 C-84,10 -80,-14 -76,12 C-72,-18 -68,20 -64,-25 C-60,15 -56,-30 -52,22 C-48,-35 -44,28 -40,-40 C-36,32 -32,-45 -28,38 C-24,-48 -20,42 -16,-50 C-12,45 -8,-48 -4,42 C0,-52 4,48 8,-45 C12,40 16,-42 20,35 C24,-38 28,30 32,-32 C36,25 40,-28 44,20 C48,-22 52,15 56,-18 C60,12 64,-14 68,8 C72,-10 76,6 80,-5 C84,4 88,-3 92,2 C96,-1 100,0 100,0" stroke="url(#wave)" stroke-width="1.5" fill="none"/>
    </g>

    <!-- Main waveform — continuous oscillating line -->
    <g transform="translate(128, 128)" filter="url(#glow)">
      <path d="M-100,0 C-95,-4 -92,6 -88,-8 C-84,10 -80,-14 -76,12 C-72,-18 -68,20 -64,-25 C-60,15 -56,-30 -52,22 C-48,-35 -44,28 -40,-40 C-36,32 -32,-45 -28,38 C-24,-48 -20,42 -16,-50 C-12,45 -8,-48 -4,42 C0,-52 4,48 8,-45 C12,40 16,-42 20,35 C24,-38 28,30 32,-32 C36,25 40,-28 44,20 C48,-22 52,15 56,-18 C60,12 64,-14 68,8 C72,-10 76,6 80,-5 C84,4 88,-3 92,2 C96,-1 100,0 100,0" stroke="url(#wave)" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>

    <!-- Braces {{ }} -->
    <g filter="url(#softglow)">
      <text x="6" y="148" font-family="monospace" font-size="62" font-weight="900" fill="url(#brace)" opacity="0.85" stroke="#ffd700" stroke-width="0.5">{{</text>
      <text x="174" y="148" font-family="monospace" font-size="62" font-weight="900" fill="url(#brace)" opacity="0.85" stroke="#ffd700" stroke-width="0.5">}}</text>
    </g>

    <!-- AUTOCALL text across waveform -->
    <!-- Dark band behind text for contrast -->
    <rect x="42" y="116" width="172" height="50" rx="6" fill="black" opacity="0.55"/>
    <text x="128" y="137" font-family="monospace" font-size="26" font-weight="900" fill="white" opacity="1" text-anchor="middle" letter-spacing="8" stroke="black" stroke-width="2" paint-order="stroke fill" filter="url(#glow)">AUTOCALL</text>
    <text x="128" y="162" font-family="monospace" font-size="26" font-weight="900" fill="white" opacity="0.9" text-anchor="middle" letter-spacing="12" stroke="black" stroke-width="2" paint-order="stroke fill" filter="url(#glow)">IVR</text>

    <!-- Horizontal accent lines through waveform -->
    <line x1="45" y1="128" x2="85" y2="128" stroke="#00f0ff" stroke-width="0.5" opacity="0.2"/>
    <line x1="171" y1="128" x2="211" y2="128" stroke="#ff3cac" stroke-width="0.5" opacity="0.2"/>

    <!-- Corner brackets (HUD frame) -->
    <g stroke="url(#brace)" stroke-width="1.5" fill="none" opacity="0.2">
      <!-- Top-left -->
      <polyline points="18,38 18,18 38,18"/>
      <!-- Top-right -->
      <polyline points="238,38 238,18 218,18"/>
      <!-- Bottom-left -->
      <polyline points="18,218 18,238 38,238"/>
      <!-- Bottom-right -->
      <polyline points="238,218 238,238 218,238"/>
    </g>

    <!-- Dot accents at corners -->
    <circle cx="18" cy="18" r="1.5" fill="#00f0ff" opacity="0.4"/>
    <circle cx="238" cy="18" r="1.5" fill="#00f0ff" opacity="0.4"/>
    <circle cx="18" cy="238" r="1.5" fill="#7b61ff" opacity="0.4"/>
    <circle cx="238" cy="238" r="1.5" fill="#ff3cac" opacity="0.4"/>

  </g>
</svg>
